name: whami
description: "WHAMI — Where Am I? Verified navigation and position trust engine."
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Map rendering
  maplibre_gl: 

  # Real GPS
  geolocator: ^14.0.3

  # Real device sensors (magnetometer, accelerometer, gyroscope)
  sensors_plus: ^7.0.0



  # Camera for landmark scanning
  camera: ^0.12.0+1

  # Local file storage
  path_provider: ^2.1.6

  # Connectivity detection
  connectivity_plus: ^6.1.0

  # HTTP for CDN downloads
  http: ^1.2.0

  # Routing
  go_router: ^14.6.2

  # State management
  provider: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
